<!DOCTYPE html>
<html>

<head>

<title>Chat History</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

.header{
    background:#6366f1;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.history-container{
    padding:20px;
}

.chat-card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

.user{
    color:#818cf8;
    margin-bottom:10px;
}

.bot{
    color:#e2e8f0;
}

.back-btn{
    position:absolute;
    left:20px;
    top:20px;
    cursor:pointer;
    font-size:20px;
}

</style>

</head>

<body>

<div class="header">

    <span
    class="back-btn"
    onclick="goBack()">
        ←
    </span>

    <span
onclick="deleteHistory()"
style="
position:absolute;
right:20px;
cursor:pointer;">
🗑
</span>

    Chat History

</div>

<div
class="history-container"
id="historyContainer">

</div>
<input
type="text"
id="searchBox"
placeholder="🔍 Search chats..."
onkeyup="searchHistory()"
style="
width:90%;
margin:20px;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;">
<input
type="text"
id="search"
placeholder="Search chats..."
onkeyup="searchHistory()">

<script>

function goBack(){

    window.location.href ="chatbot.html";
}
function searchHistory(){

    const value =
    document.getElementById("searchBox")
    .value
    .toLowerCase();

    const cards =
    document.querySelectorAll(".chat-card");

    cards.forEach(card => {

        if(
            card.innerText
            .toLowerCase()
            .includes(value)
        ){
            card.style.display = "block";
        }

        else{
            card.style.display = "none";
        }
    });
}

async function loadHistory(){

    async function deleteHistory(){

    const confirmDelete =
    confirm("Delete all chats?");

    if(!confirmDelete){
        return;
    }

    await fetch(
    "https://chatassist-backend.onrender.com/history",
    {
        method:"DELETE",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            userId:
            localStorage.getItem("userId")
        })
    });

    location.reload();
}

    const userId =
    localStorage.getItem("userId");

    const response = await fetch(
    `https://chatassist-backend.onrender.com/history?userId=${userId}`
    );

    const chats = await response.json();
    const container =
    document.getElementById(
    "historyContainer"
    );

    chats.forEach(chat => {

        container.innerHTML += `

        <div class="chat-card">

            <div class="user">
                <b>You:</b>
                ${chat.userMessage}
            </div>

            <div class="bot">
                <b>AI:</b>
                ${chat.botReply}
            </div>

        </div>
        `;
    });
}

loadHistory();
function searchHistory(){

    const value =
    document.getElementById("search")
    .value.toLowerCase();

    const cards =
    document.querySelectorAll(".chat-card");

    cards.forEach(card=>{

        if(card.innerText
        .toLowerCase()
        .includes(value)){

            card.style.display="block";
        }

        else{

            card.style.display="none";
        }
    });
}

</script>

</body>
</html>
