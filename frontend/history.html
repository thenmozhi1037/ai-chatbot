<!DOCTYPE html>
<html>

<head>

    <title>Chat History</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app-container">

    <div class="chat-container">

        <div class="header">

            <span>
                📜 Chat History
            </span>

            <div class="header-icons">

                <span
                class="icon-btn"
                onclick="deleteHistory()">
                    🗑️
                </span>

                <span
                class="icon-btn"
                onclick="goBack()">
                    ←
                </span>

            </div>

        </div>

        <div style="padding:15px;">

            <input
            type="text"
            id="searchBox"
            class="search-box"
            placeholder="🔍 Search chats...">

        </div>

        <div
        class="chat-box"
        id="historyContainer">
        </div>

    </div>

</div>

<script>

function goBack(){

    window.location.href =
    "chatbot.html";
}

/* Load History */
async function loadHistory(){

    try{

        const userId =
        localStorage.getItem(
        "userId"
        );

        const response =
        await fetch(
        `https://chatassist-backend.onrender.com/history?userId=${userId}`
        );

        const chats =
        await response.json();

        const container =
        document.getElementById(
        "historyContainer"
        );

        container.innerHTML = "";

        chats.forEach(chat=>{

            container.innerHTML += `

            <div class="history-item searchable">

                <div style="
                color:#818cf8;
                margin-bottom:10px;">
                    <b>You:</b>
                    ${chat.userMessage}
                </div>

                <div>
                    <b>AI:</b>
                    ${chat.botReply}
                </div>

            </div>

            `;
        });

    }catch(err){

        console.log(err);
    }
}

/* Search */
document
.getElementById("searchBox")
.addEventListener(
"keyup",
function(){

    const value =
    this.value.toLowerCase();

    const cards =
    document.querySelectorAll(
    ".searchable"
    );

    cards.forEach(card=>{

        if(
            card.innerText
            .toLowerCase()
            .includes(value)
        ){
            card.style.display =
            "block";
        }
        else{
            card.style.display =
            "none";
        }
    });
});

/* Delete History */
async function deleteHistory(){

    const ok =
    confirm(
    "Delete all chat history?"
    );

    if(!ok) return;

    try{

        await fetch(
        "https://chatassist-backend.onrender.com/history",
        {
            method:"DELETE",

            headers:{
                "Content-Type":
                "application/json"
            },

            body:JSON.stringify({
                userId:
                localStorage.getItem(
                "userId"
                )
            })
        });

        alert(
        "History Deleted"
        );

        loadHistory();

    }catch(err){

        alert(
        "Delete Failed"
        );
    }
}

loadHistory();

</script>

</body>
</html>
