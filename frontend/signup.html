<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>

    <style>

        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#0f172a;
            font-family:Arial;
        }

        .signup-box{
            width:350px;
            background:#111827;
            padding:40px;
            border-radius:20px;
            box-shadow:0 0 20px rgba(0,0,0,0.5);
            text-align:center;
        }

        h1{
            color:white;
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:15px;
            margin-bottom:15px;
            border:none;
            border-radius:10px;
            background:#1f2937;
            color:white;
            font-size:16px;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#6366f1;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#4f46e5;
        }

        p{
            color:white;
            margin-top:15px;
        }

        a{
            color:#818cf8;
        }

    </style>
</head>

<body>

    <div class="signup-box">

        <h1>Create Account</h1>

        <input type="text"
        id="username"
        placeholder="Enter Username">

        <input type="email"
        id="email"
        placeholder="Enter Email">

        <input type="password"
        id="password"
        placeholder="Enter Password">

        <button onclick="signup()">
            Signup
        </button>

        <p>
            Already have account?
            <a href="index.html">Login</a>
        </p>

    </div>

<script>

async function signup(){

    const username =
    document.getElementById("username").value;

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    const response = await fetch(
    "https://chatassist-backend.onrender.com/signup",
    {
        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            username,
            email,
            password
        })
    });

    const data = await response.json();

    alert(data.message);

    if(data.message === "Signup Successful"){

        window.location.href = "index.html";
    }
}

</script>

</body>
</html>
