<!DOCTYPE html>
<html>

<head>
    <title>AI Chatbot</title>

    <style>

        body{
            margin:0;
            background:#0f172a;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .chat-container{
            width:400px;
            height:650px;
            background:#111827;
            border-radius:20px;
            display:flex;
            flex-direction:column;
            overflow:hidden;
            box-shadow:0 0 20px rgba(0,0,0,0.5);
        }

        .header{
            background:#6366f1;
            color:white;
            padding:20px;
            font-size:22px;
            font-weight:bold;
            text-align:center;
        }

        .chat-box{
            flex:1;
            padding:20px;
            overflow-y:auto;
            color:white;
        }

        .message{
            margin-bottom:15px;
            padding:12px;
            border-radius:10px;
            max-width:80%;
        }

        .user{
            background:#4f46e5;
            margin-left:auto;
        }

        .bot{
            background:#1f2937;
        }

        .input-area{
            display:flex;
            padding:15px;
            background:#1e293b;
        }

        input{
            flex:1;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#334155;
            color:white;
            font-size:16px;
        }

        button{
            margin-left:10px;
            padding:12px 20px;
            border:none;
            border-radius:10px;
            background:#6366f1;
            color:white;
            cursor:pointer;
            font-size:16px;
        }

    </style>
</head>

<body>
    

<div class="chat-container">

    <div class="header">

    <span
    onclick="openHistory()"
    style="
    position:absolute;
    left:20px;
    cursor:pointer;">
        📜
    </span>

    <span
    onclick="newChat()"
    style="
    position:absolute;
    right:20px;
    cursor:pointer;">
        ➕
    </span>
    <span
onclick="toggleTheme()"
style="
position:absolute;
right:60px;
cursor:pointer;">
🌙
</span>

    <span id="welcomeUser">
        ChatAssist AI
    </span>

</div>

    <div class="chat-box" id="chatBox">

    </div>
    <div id="typing"
style="
display:none;
padding:10px;
color:white;">
🤖 AI is typing...
</div>

    <div class="input-area">

        <input
        type="text"
        id="message"
        placeholder="Type message...">

        <button onclick="sendMessage()">
            Send
        </button>
        <button onclick="startVoice()">
🎤
</button>
        <button onclick="newChat()">➕ New Chat</button>

    </div>

</div>

<script>

    document.getElementById("welcomeUser")
.innerText =
"🤖 ChatAssist AI - " +
localStorage.getItem("username");

async function sendMessage(){

    const message =
    document.getElementById("message").value;
    document.getElementById("typing").style.display = "block";

    const chatBox =
    document.getElementById("chatBox");

    chatBox.innerHTML += `
    <div class="message user">
        ${message}
    </div>
    `;

    document.getElementById("message").value = "";

    const response = await fetch(
    "https://chatassist-backend.onrender.com/chat",
    {
        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body: JSON.stringify({
    message,
    userId: localStorage.getItem("userId")
})
    });

    const data = await response.json();
    document.getElementById("typing").style.display = "none";

    chatBox.innerHTML += `
    <div class="message bot">
        ${data.reply}
    </div>
    `;

    chatBox.scrollTop =
    chatBox.scrollHeight;
}
function startVoice(){

    const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

    const recognition =
    new SpeechRecognition();

    recognition.lang = "en-US";

    recognition.start();

    recognition.onresult = function(event){

        const speech =
        event.results[0][0].transcript;

        document.getElementById("message").value =
        speech;
    };
}
function openHistory(){

    window.location.href = "history.html";
}

function toggleTheme(){

    document.body.classList.toggle("light-mode");

    if(document.body.classList.contains("light-mode")){
        localStorage.setItem("theme","light");
    }
    else{
        localStorage.setItem("theme","dark");
    }
}

window.onload = function(){

    if(localStorage.getItem("theme") === "light"){
        document.body.classList.add("light-mode");
    }
}
function newChat(){

    document.getElementById("chatBox").innerHTML = "";
}

</script>

</body>
</html>
