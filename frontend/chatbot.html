<!DOCTYPE html>
<html>

<head>
    <title>ChatAssist AI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app-container">

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>🤖 ChatAssist</h2>

        <button onclick="newChat()">
            ➕ New Chat
        </button>

        <button onclick="openHistory()">
            📜 History
        </button>

        <input
        type="text"
        id="searchInput"
        class="search-box"
        placeholder="Search Chats">

        <div
        class="history-list"
        id="historyList">
        </div>

    </div>

    <!-- Chat Area -->

    <div class="chat-container">

        <div class="header">

            <span id="welcomeUser">
                ChatAssist AI
            </span>

            <div class="header-icons">

                <span
                class="icon-btn"
                onclick="toggleTheme()">
                    🌙
                </span>

            </div>

        </div>

        <div
        class="chat-box"
        id="chatBox">
        </div>

        <div
        class="typing"
        id="typing">
            🤖 AI is typing...
        </div>

        <div class="input-area">

            <input
            type="text"
            id="message"
            placeholder="Type a message...">

            <button
            class="voice-btn"
            onclick="startVoice()">
                🎤
            </button>

            <button
            class="send-btn"
            onclick="sendMessage()">
                Send
            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

<script>

document.getElementById("welcomeUser").innerText =
"🤖 ChatAssist AI - " +
(localStorage.getItem("username") || "User");

</script>

</body>

</html>
